    const slugCounts = new Map();
    function slugify(text) {
      const base = text
        .replace(/<[^>]+>/g, '')
        .replace(/[*_`]/g, '')
        .replace(/&nbsp;/g, ' ')
        .trim()
        .slice(0, 60) || 'section';
      const key = encodeURIComponent(base).replace(/%/g, '').toLowerCase();
      const count = slugCounts.get(key) || 0;
      slugCounts.set(key, count + 1);
      return count ? `${key}-${count + 1}` : key;
    }

    function renderInline(input) {
      let html = escapeHTML(input);
      html = html.replace(/&lt;br\s*\/?&gt;/gi, '<br/>');
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) => `<figure><img src="${url}" alt="" loading="lazy" onerror="this.closest('figure')?.classList.add('is-missing')"></figure>`);
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => `<a href="${url}" target="_blank" rel="noreferrer">${text}</a>`);
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      return html;
    }

    function splitTableRow(line) {
      const trimmed = line.trim().replace(/^\|/, '').replace(/\|$/, '');
      return trimmed.split('|').map(cell => cell.trim());
    }

    function isTableDivider(line) {
      return /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)+\|?\s*$/.test(line);
    }

    function isTableStart(lines, index) {
      return lines[index]?.includes('|') && isTableDivider(lines[index + 1] || '');
    }

    function renderTable(lines) {
      const head = splitTableRow(lines[0]);
      const body = lines.slice(2).map(splitTableRow);
      const ths = head.map(cell => `<th>${renderInline(cell)}</th>`).join('');
      const rows = body.map(row => `<tr>${row.map(cell => `<td>${renderInline(cell)}</td>`).join('')}</tr>`).join('');
      return `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function renderMarkdown(md) {
      const lines = md.split(/\r?\n/);
      const html = [];
      let paragraph = [];
      let list = [];
      let listType = null;
      let quote = [];

      function flushParagraph() {
        if (!paragraph.length) return;
        const text = paragraph.join('<br/>').trim();
        if (/^\s*!\[[^\]]*\]\([^)]+\)\s*$/.test(paragraph.join('\n').trim())) {
          html.push(renderInline(paragraph.join('\n').trim()));
        } else {
          html.push(`<p>${renderInline(text)}</p>`);
        }
        paragraph = [];
      }
      function flushList() {
        if (!list.length) return;
        const tag = listType === 'ol' ? 'ol' : 'ul';
        html.push(`<${tag}>${list.map(item => `<li>${renderInline(item)}</li>`).join('')}</${tag}>`);
        list = [];
        listType = null;
      }
      function flushQuote() {
        if (!quote.length) return;
        html.push(`<blockquote><p>${renderInline(quote.join('<br/>'))}</p></blockquote>`);
        quote = [];
      }
      function flushAll() { flushParagraph(); flushList(); flushQuote(); }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trim();

        if (!trimmed) {
          flushAll();
          continue;
        }

        if (/^:::details\b/.test(trimmed)) {
          flushAll();
          let rest = trimmed.replace(/^:::details\s*/, '').trim();
          let isOpen = false;
          if (rest.startsWith('open ')) {
            isOpen = true;
            rest = rest.replace(/^open\s+/, '').trim();
          } else if (rest === 'open') {
            isOpen = true;
            rest = '';
          }
          const summary = rest || '展开查看';
          const detailLines = [];
          i += 1;
          while (i < lines.length && lines[i].trim() !== ':::') {
            detailLines.push(lines[i]);
            i += 1;
          }
          html.push(`<details class="collapsible-question"${isOpen ? ' open' : ''}><summary>${renderInline(summary)}</summary><div class="collapsible-body">${renderMarkdown(detailLines.join('\n'))}</div></details>`);
          continue;
        }

        if (isTableStart(lines, i)) {
          flushAll();
          const tableLines = [lines[i], lines[i + 1]];
          i += 2;
          while (i < lines.length && lines[i].includes('|') && lines[i].trim()) {
            tableLines.push(lines[i]);
            i += 1;
          }
          i -= 1;
          html.push(renderTable(tableLines));
          continue;
        }

        const heading = trimmed.match(/^(#{2,4})\s+(.+)$/);
        if (heading) {
          flushAll();
          const level = heading[1].length;
          const title = heading[2].trim();
          const id = slugify(title);
          html.push(`<h${level} id="${id}">${renderInline(title)}</h${level}>`);
          continue;
        }

        if (/^---+$/.test(trimmed)) {
          flushAll();
          html.push('<hr/>');
          continue;
        }

        if (trimmed.startsWith('>')) {
          flushParagraph();
          flushList();
          quote.push(trimmed.replace(/^>\s?/, ''));
          continue;
        }

        const unordered = trimmed.match(/^[-*]\s+(.+)$/);
        if (unordered) {
          flushParagraph();
          flushQuote();
          if (listType && listType !== 'ul') flushList();
          listType = 'ul';
          list.push(unordered[1]);
          continue;
        }

        const ordered = trimmed.match(/^\d+\.\s+(.+)$/);
        if (ordered) {
          flushParagraph();
          flushQuote();
          if (listType && listType !== 'ol') flushList();
          listType = 'ol';
          list.push(ordered[1]);
          continue;
        }

        flushList();
        flushQuote();
        paragraph.push(trimmed);
      }
      flushAll();
      return html.join('\n');
    }

    function wrapChapters() {
      const nodes = [...content.childNodes];
      let current = null;
      nodes.forEach(node => {
        if (node.nodeType === 1 && node.matches('h2')) {
          current = document.createElement('section');
          current.className = 'chapter-card';
          content.insertBefore(current, node);
        }
        if (current) current.appendChild(node);
      });
    }

    function visualLength(text) {
      return [...text.replace(/\s+/g, ' ').trim()].reduce((sum, char) => {
        return sum + (/[^\x00-\xff]/.test(char) ? 1.8 : 1);
      }, 0);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function fitTableColumns(wrap, table, headers, imageCount) {
      const rows = [...table.querySelectorAll('tr')];
      const colCount = Math.max(...rows.map(row => row.children.length), 0);
      if (!colCount) return;

      const widths = Array.from({ length: colCount }, (_, colIndex) => {
        const cells = rows.map(row => row.children[colIndex]).filter(Boolean);
        const header = headers[colIndex] || '';
        const maxText = Math.max(...cells.map(cell => visualLength(cell.textContent)), 0);
        const hasImage = cells.some(cell => cell.querySelector('img'));
        const hasGallery = cells.some(cell => cell.querySelector('.table-image-row'));
        const hasPercent = cells.some(cell => /\d+(\.\d+)?%/.test(cell.textContent));
        const hasScale = cells.some(cell => cell.classList.contains('scale-cell'));
        const hasManyBreaks = cells.some(cell => cell.querySelectorAll('br').length >= 2);
        const mostlyShort = cells.slice(1).every(cell => visualLength(cell.textContent) <= 8);

        let width = maxText * 7.2 + 44;
        let min = 96;
        let max = 300;

        if (/排序/.test(header)) {
          min = 72;
          max = 92;
          width = 78;
        } else if (/GAP/i.test(header) || (mostlyShort && visualLength(header) <= 8)) {
          min = 88;
          max = 116;
        } else if (hasPercent || hasScale) {
          min = 150;
          max = 190;
          width = 172;
        } else if (hasGallery) {
          min = 420;
          max = 620;
          width = 520;
        } else if (hasImage) {
          min = imageCount > 3 ? 220 : 190;
          max = imageCount > 3 ? 280 : 240;
          width = imageCount > 3 ? 240 : 210;
        } else if (hasManyBreaks || maxText > 46) {
          min = 230;
          max = imageCount ? 340 : 380;
          width = maxText * 4.8 + 64;
        } else if (maxText <= 12) {
          min = 110;
          max = 170;
        } else if (maxText <= 24) {
          min = 150;
          max = 240;
        }

        return Math.round(clamp(width, min, max));
      });

      const floor = colCount <= 4 ? 860 : colCount <= 5 ? 980 : colCount <= 7 ? 1080 : 1240;
      let total = widths.reduce((sum, width) => sum + width, 0);
      if (total < floor) {
        const growable = widths.map((width, index) => (/排序/.test(headers[index] || '') ? 0 : Math.max(0, 320 - width)));
        const growableTotal = growable.reduce((sum, value) => sum + value, 0) || 1;
        const extra = floor - total;
        widths.forEach((width, index) => {
          widths[index] = Math.round(width + extra * (growable[index] / growableTotal));
        });
        total = widths.reduce((sum, width) => sum + width, 0);
      }

      table.querySelector('colgroup')?.remove();
      const colgroup = document.createElement('colgroup');
      widths.forEach(width => {
        const col = document.createElement('col');
        col.style.width = `${width}px`;
        colgroup.appendChild(col);
      });
      table.prepend(colgroup);
      table.style.setProperty('--table-width', `${total}px`);
      table.style.setProperty('--table-min-width', `${Math.min(total, floor)}px`);
    }

    function mergeTrailingImageColumn(table, headers) {
      const lastIndex = headers.length - 1;
      const hasDuplicateHeader = headers.slice(0, -1).includes(headers[lastIndex]);
      const bodyRows = [...(table.tBodies[0]?.rows || [])];
      if (!hasDuplicateHeader || bodyRows.length < 2) return;

      const firstCell = bodyRows[0].cells[lastIndex];
      const trailingCells = bodyRows.slice(1).map(row => row.cells[lastIndex]).filter(Boolean);
      const canMerge = firstCell?.querySelector('img') && trailingCells.every(cell => !cell.textContent.trim() && !cell.querySelector('img'));
      if (!canMerge) return;

      firstCell.rowSpan = bodyRows.length;
      firstCell.classList.add('merged-image-cell');
      trailingCells.forEach(cell => cell.remove());
    }

    function groupTableCellImages(table) {
      [...table.querySelectorAll('td')].forEach(td => {
        if (td.classList.contains('merged-image-cell')) return;
        const figures = [...td.querySelectorAll(':scope > figure')];
        if (figures.length < 2) return;

        td.classList.add('image-gallery-cell');
        [...td.querySelectorAll(':scope > br')].forEach(br => {
          const nearFigure = br.previousElementSibling?.tagName === 'FIGURE' || br.nextElementSibling?.tagName === 'FIGURE';
          if (nearFigure) br.remove();
        });

        const row = document.createElement('div');
        row.className = 'table-image-row';
        figures[0].parentNode.insertBefore(row, figures[0]);
        figures.forEach(figure => row.appendChild(figure));
      });
    }

    function parseCommunityScale(text) {
      const match = text.trim().match(/^(\d+(?:\.\d+)?)\s*([MK])$/i);
      if (!match) return null;
      const value = Number(match[1]);
      return match[2].toUpperCase() === 'M' ? value : value / 1000;
    }

    function enhanceCommunityScaleColumn(table, headers) {
      const scaleIndex = headers.findIndex((header, index) => index > 0 && header.includes('全球华人社区规模'));
      if (scaleIndex < 0) return;

      const cells = [...(table.tBodies[0]?.rows || [])]
        .map(row => row.cells[scaleIndex])
        .filter(Boolean);
      const values = cells.map(cell => parseCommunityScale(cell.textContent));
      const max = Math.max(...values.filter(value => value !== null), 1);

      cells.forEach((cell, index) => {
        const value = values[index];
        if (value === null) return;
        cell.classList.add('scale-cell');
        const width = Math.max(5, Math.round(value / max * 100));
        cell.insertAdjacentHTML('beforeend', `<span class="scale-bar" aria-hidden="true"><span style="--p:${width}%"></span></span>`);
      });
    }

    function enhanceTables() {
      [...content.querySelectorAll('.table-wrap')].forEach((wrap, index) => {
        const table = wrap.querySelector('table');
        const headers = [...table.querySelectorAll('th')].map(th => th.textContent.trim());
        const colCount = headers.length;
        const text = table.textContent;
        const imageCount = table.querySelectorAll('img').length;
        wrap.dataset.label = `表格 ${String(index + 1).padStart(2, '0')}`;
        if (headers.includes('案例')) wrap.classList.add('case-icon-table');
        if (headers.includes('对应案例') && headers.includes('维度')) wrap.classList.add('case-select-table');
        if (imageCount) wrap.classList.add('media-table');
        if (text.includes('微汇款当前用户占比')) wrap.classList.add('market-table');
        if (colCount <= 4 && table.querySelectorAll('tbody tr').length <= 4) wrap.classList.add('compact-table');

        enhanceCommunityScaleColumn(table, headers);
        fitTableColumns(wrap, table, headers, imageCount);

        const percentCells = [...table.querySelectorAll('td')].filter(td => /\d+(\.\d+)?%/.test(td.textContent));

        percentCells.forEach((td, i) => {
          td.classList.add('percent-cell');
          const width = Math.max(5, Math.round(values[i] / max * 100));
          td.insertAdjacentHTML('beforeend', `<span class="percent-bar" aria-hidden="true"><span style="--p:${width}%"></span></span>`);
        });

          if (/^(\+|-|≥)/.test(clean) && clean.length <= 8) {
            td.innerHTML = `<span class="gap-pill">${td.innerHTML}</span>`;
          }
        });
      });

      function escapeTxt(val) {
        return val
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

      function renderAmountVisual(text, id) {
        // Normalize HTML entities first to avoid splitting on semicolons inside entities
        const cleanText = text.replace(/&lt;/gi, '<').replace(/&gt;/gi, '>').replace(/&amp;/gi, '&');
        const parts = cleanText.split(/[；;]/);
        const desc = parts[0] ? parts[0].trim() : '';
        let amount = parts[1] ? parts[1].trim() : '';
        amount = amount.replace(/Top：|Top:/g, '').trim();
        
        let width = '40%';
        if (id === 'young') width = '25%';
        if (id === 'investor') width = '90%';
        
        return `
          <div class="amount-visual">
            <span class="amount-number">${escapeTxt(amount)}</span>
            <span class="amount-desc">${escapeTxt(desc)}</span>
            <div class="amount-scale-track">
              <div class="amount-scale-bar" style="width: ${width}"></div>
            </div>
          </div>
        `;
      }

      function renderFrequencyVisual(text, id) {
        // Normalize HTML entities first to avoid splitting on semicolons inside entities
        const cleanText = text.replace(/&lt;/gi, '<').replace(/&gt;/gi, '>').replace(/&amp;/gi, '&');
        const parts = cleanText.split(/[；;]/);
        const desc = parts[0] ? parts[0].trim() : '';
        const freqText = parts[1] ? parts[1].trim() : '';
        
        let activeDots = 4;
        if (id === 'investor') activeDots = 2;
        if (id === 'young') activeDots = 1;
        
        let dotsHtml = '<div class="frequency-dots">';
        for (let i = 1; i <= 4; i++) {
          const activeClass = i <= activeDots ? 'active' : '';
          dotsHtml += `<span class="freq-dot ${activeClass}"></span>`;
        }
        dotsHtml += '</div>';
        
        return `
          <div class="frequency-visual">
            <span class="frequency-text">${escapeTxt(freqText)}</span>
            <span class="frequency-desc">${escapeTxt(desc)}</span>
            ${dotsHtml}
          </div>
        `;
      }

    function clusterImages(root) {
      const children = [...root.children];
      let cluster = [];
      const flush = () => {
        if (cluster.length < 2) { cluster = []; return; }
        const box = document.createElement('div');
        box.className = 'image-cluster';
        
        let prev = cluster[0].previousElementSibling;
        let isOverview = false;
        while (prev) {
          if ((prev.tagName === 'H4' || prev.tagName === 'H3') && prev.textContent.includes('业务概览')) {
            isOverview = true;
            break;
          }
          if (prev.tagName === 'H3' || prev.tagName === 'H2') {
            break;
          }
          prev = prev.previousElementSibling;
        }
        if (isOverview) {
          box.classList.add('overview-cluster');
        }

        cluster[0].parentNode.insertBefore(box, cluster[0]);
        cluster.forEach(figure => box.appendChild(figure));
        cluster = [];
      };
      children.forEach(child => {
        if (child.tagName === 'FIGURE') {
          cluster.push(child);
        } else {
          flush();
        }
      });
      flush();
    }

      function showSlide(index) {
        currentIndex = (index + 3) % 3;
        
        groups.forEach(group => {

          group.classList.toggle('active', idx === currentIndex);
        });

        dots.forEach(dot => {

          dot.classList.toggle('active', idx === currentIndex);
        });
      }
      
      function nextSlide() {
        showSlide(currentIndex + 1);
      }
      
      function prevSlide() {
        showSlide(currentIndex - 1);
      }
      
      function stopAutoPlay() {
        if (playInterval) {
          clearInterval(playInterval);
          playInterval = null;
          playIcon.style.display = 'block';
          pauseIcon.style.display = 'none';
          playText.textContent = '自动播放';
          playBtn.classList.remove('playing');
        }
      }
      
      function startAutoPlay() {
        stopAutoPlay();
        playInterval = setInterval(nextSlide, 5000);
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
        playText.textContent = '暂停播放';
        playBtn.classList.add('playing');

      });
      
      dots.forEach(dot => {

          stopAutoPlay();
          const idx = parseInt(dot.dataset.index);
          showSlide(idx);
        });
      });
      
      prevBtn.addEventListener('click', () => {
        stopAutoPlay();
        prevSlide();
      });
      nextBtn.addEventListener('click', () => {
        stopAutoPlay();
        nextSlide();
      });
      
      playBtn.addEventListener('click', () => {
        if (playInterval) {
          stopAutoPlay();
        } else {
          startAutoPlay();
        }
      });
    }

        const platformName = cells[0].textContent.trim();
        const dimensionName = cells[1].textContent.trim();

        if (platformName) {
          currentPlatform = {
            name: platformName,
            key: `platform-${platforms.length}`,
            brands: brandNames.map((name, index) => ({ name, key: `brand-${index}`, fields: {} }))
          };
          platforms.push(currentPlatform);
          lastDimension = '';
        }
        if (!currentPlatform) return;

        const fieldName = dimensionName || lastDimension;
        if (!fieldName) return;
        if (dimensionName) lastDimension = dimensionName;

        currentPlatform.brands.forEach((brand, index) => {
          const html = cells[index + 2]?.innerHTML.trim() || '';
          if (!html) return;
          if (dimensionName) {
            brand.fields[fieldName] = html;
          } else {
            brand.fields[fieldName] = [brand.fields[fieldName], html].filter(Boolean).join('<br/><br/>');
          }
        });
      });

      if (!platforms.length) return;

      const platformSummary = {
        '快手': {
          role: '务工型市场触达',
          signal: '韩国 / 日本蓝领账号更容易形成有效覆盖',
          action: '围绕发薪、汇率提醒、口播教程和中文答疑做定点运营'
        },
        '抖音': {
          role: '流程教学与渠道比较',
          signal: '教程类与真实操作内容更容易沉淀赞藏',
          action: '用 30 秒流程视频、平台对比和评论区答疑承接高意图用户'
        },
        '小红书': {
          role: '搜索承接与长期沉淀',
          signal: '政策、汇率、本地生活资讯和收款 FAQ 更适合收藏复查',
          action: '建立地区矩阵与关键词内容库，持续占位主动搜索结果'
        }
      };

      function toText(html) {
        const box = document.createElement('div');
        box.innerHTML = html || '';
        return (box.textContent || '')
          .replace(/\*+/g, '')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function textWithBreaks(html) {
        const box = document.createElement('div');
        box.innerHTML = html || '';
        box.querySelectorAll('figure').forEach(figure => figure.remove());
        box.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
        return (box.textContent || '')
          .replace(/\*+/g, '')
          .replace(/\|\|/g, ' || ')
          .replace(/\u00a0/g, ' ')
          .replace(/[ \t]+/g, ' ')
          .trim();
      }

      function getField(brand, names) {
        for (const name of names) {
          if (brand.fields[name]) return brand.fields[name];
        }
        return '';
      }

      function splitMediaCell(html) {
        const box = document.createElement('div');
        box.innerHTML = html || '';
        const figures = [...box.querySelectorAll('figure')].map(figure => figure.outerHTML).join('');
        box.querySelectorAll('figure').forEach(figure => figure.remove());
        return { text: box.innerHTML.trim(), figures };
      }

      function splitBlocks(html) {
        const raw = textWithBreaks(html)
          .replace(/\n\s*---\s*\n/g, '\n\n')
          .replace(/---/g, '\n\n');
        const blocks = raw
          .split(/\n{1,}/)
          .flatMap(part => {
            const plain = part.replace(/\s+/g, ' ').trim();
            if (!plain || plain === '-') return [];
            const numbered = plain.split(/(?=\d+[）)]\s*)/).map(item => item.trim()).filter(Boolean);
            return numbered.length > 1 ? numbered : [plain];
          });
        return blocks.filter(Boolean);
      }

      function renderBlocks(html, emptyText = '-') {
        const blocks = splitBlocks(html);
        if (!blocks.length) return escapeHTML(emptyText);
        return `<div class="matrix-rich-list">${blocks.map(block => `<div class="matrix-rich-item">${escapeHTML(block)}</div>`).join('')}</div>`;
      }

      function renderTypeText(html) {
        const plain = toText(html);
        if (!plain || plain === '-') return '-';
        return escapeHTML(plain.replace(/[、,+，/]+/g, ' / '));
      }

      function truncatePlain(text, max = 86) {
        const clean = (text || '').replace(/\s+/g, ' ').trim();
        return clean.length > max ? `${clean.slice(0, max)}…` : clean;
      }

      function renderCompactList(html, maxItems = 3, maxChars = 120) {
        const blocks = splitBlocks(html);
        const items = (blocks.length ? blocks : [toText(html || '-')])
          .map(item => truncatePlain(item, maxChars))
          .filter(Boolean);
        const visible = items.slice(0, maxItems);
        const more = items.length > maxItems ? `<span class="matrix-more-hint">+${items.length - maxItems} 条，切到完整表格查看</span>` : '';
        return `<div class="matrix-compact-list">${visible.map(item => `<span class="matrix-compact-item">${escapeHTML(item)}</span>`).join('')}${more}</div>`;
      }

      function splitHotPosts(html) {
        const lines = splitBlocks(html)
          .map(line => line.replace(/@image:[^\s]+/gi, '').replace(/image\.png/gi, '').replace(/\s+/g, ' ').trim())
          .filter(line => line && !/^[@\s]*(?:image|图片)/i.test(line));
        const posts = [];
        const metricOnly = /^\d+\s*(?:点赞|赞)(?:(?:[，,、\s]+)\d+\s*(?:收藏|评论))*$/;
        const metricTail = /(\d+\s*(?:点赞|赞)(?:(?:[，,、\s]+)\d+\s*(?:收藏|评论))*)$/;

        lines.forEach(line => {
          const normalized = line.replace(/[“”]/g, '').trim();
          if (!normalized || /^（.*）$/.test(normalized)) return;

          if (metricOnly.test(normalized)) {
            const last = posts[posts.length - 1];
            if (last && !metricTail.test(last)) posts[posts.length - 1] = `${last} ${normalized}`;
            return;
          }

          const parts = normalized
            .split(/(?<=\d\s*(?:点赞|赞))\s+(?=\S)/)
            .map(part => part.trim())
            .filter(Boolean);
          parts.forEach(part => posts.push(part));
        });

        return posts.filter(post => /\S/.test(post) && !/^\d+\s*(?:点赞|赞)/.test(post));
      }

      function renderFullList(html) {
        const items = splitHotPosts(html);
        if (!items.length) return '<div class="matrix-hot-list"><div class="matrix-hot-item"><span class="matrix-hot-title">无</span></div></div>';
        return `<div class="matrix-hot-list">${items.map((item, index) => {
          const metricMatch = item.match(/(\d+\s*(?:点赞|赞)(?:(?:[，,、\s]+)\d+\s*(?:收藏|评论))*)$/);
          const metric = metricMatch ? metricMatch[1].replace(/\s+/g, ' ') : '';
          const title = (metricMatch ? item.slice(0, metricMatch.index) : item).replace(/[“”]/g, '').trim();
          return `<div class="matrix-hot-item"><span class="matrix-hot-rank">TOP ${index + 1}</span><span class="matrix-hot-title">${escapeHTML(title || item)}</span>${metric ? `<span class="matrix-hot-metric">${escapeHTML(metric)}</span>` : ''}</div>`;
        }).join('')}</div>`;
      }

      function renderThumbs(html) {
        const media = splitMediaCell(html);
        if (!media.figures) return '';
        return `<div class="matrix-card-shots">${media.figures}</div>`;
      }

      function coverageTone(coverage) {
        const text = toText(coverage);
        if (/差|低|少|不明确|不活跃|活跃度低|0-5/.test(text)) {
          return { className: 'is-weak', label: '覆盖偏弱' };
        }
        if (/蓝领|澳洲|全球|官号|粉丝多|覆盖|居多|以色列/.test(text)) {
          return { className: 'is-strong', label: '覆盖有效' };
        }
        return { className: 'is-medium', label: '待验证' };
      }

      function renderAudienceFlow(target, coverage) {
        const tone = coverageTone(coverage);
        return `
          <div class="matrix-audience-flow">
            <div class="matrix-audience-box">
              <span class="matrix-audience-label">账号定位客群</span>
              <span class="matrix-audience-text">${escapeHTML(truncatePlain(toText(target), 88))}</span>
            </div>
            <div class="matrix-audience-arrow">→</div>
            <div class="matrix-audience-box is-result">
              <span class="matrix-audience-label">实际覆盖结果</span>
              <span class="matrix-coverage-tone ${tone.className}">${tone.label}</span>
              <span class="matrix-audience-text">${escapeHTML(truncatePlain(toText(coverage), 88))}</span>
            </div>
          </div>
        `;
      }

      function parseFollowers(html) {
        const plain = toText(html).replace(/,/g, '');
        const values = [...plain.matchAll(/\d+(?:\.\d+)?/g)].map(match => Number(match[0]));
        return values.length ? Math.max(...values) : 0;
      }

      function summarizeTopBrand(platform) {
        const ranked = platform.brands
          .map(brand => ({ brand, value: parseFollowers(getField(brand, ['关注'])) }))
          .sort((a, b) => b.value - a.value);
        const top = ranked[0];
        if (!top || !top.value) return '暂无明确规模优势';
        return `${top.brand.name}：${toText(getField(top.brand, ['关注']))}`;
      }

      const platformTabsHTML = platforms.map((platform, index) => `
        <button class="matrix-platform-tab${index === 0 ? ' active' : ''}" data-platform="${platform.key}">${getPlatformSvg(platform.name)}${escapeHTML(platform.name)}</button>
      `).join('');

      const panelsHTML = platforms.map((platform, platformIndex) => {
        const summary = platformSummary[platform.name] || { role: '平台观察', signal: '账号矩阵与内容主题存在差异', action: '按平台用户结构配置内容与讲述者' };
        const brandItems = platform.brands.map(brand => ({
          name: brand.name,
          key: brand.key,
          fans: getField(brand, ['关注']) || '-',
          target: getField(brand, ['目标用户']) || '-',
          coverage: getField(brand, ['覆盖情况', '覆盖用户']) || '-',
          accountContent: getField(brand, ['账号内容']) || '-',
          hotContent: getField(brand, ['热帖内容']) || '无',
          tags: getField(brand, ['热点标签']) || '-',
          page: getField(brand, ['页面'])
        }));
        const maxFollowers = Math.max(...brandItems.map(item => parseFollowers(item.fans)), 1);

        const renderGridRow = (label, cells, rowClass = '') => `
          <div class="matrix-grid-row ${rowClass}">
            <div class="matrix-row-label">${label}</div>
            ${cells.map(cell => `<div class="matrix-grid-cell">${cell}</div>`).join('')}
          </div>
        `;

        const brandRow = renderGridRow('品牌', brandItems.map(item => `
          <div class="matrix-brand-name">${escapeHTML(item.name)}</div>
        `), 'matrix-brand-row');
        const pageRow = renderGridRow('页面', brandItems.map(item => `
          <div class="matrix-page-cell">
            ${renderThumbs(item.page)}
          </div>
        `), 'matrix-page-row');
        const followerRow = renderGridRow('关注规模', brandItems.map(item => {
          const value = parseFollowers(item.fans);
          const width = Math.max(5, Math.round(value / maxFollowers * 100));
          return `
            <div class="matrix-follower-cell">
              <div class="matrix-follower-value">${escapeHTML(toText(item.fans) || '-')}</div>
              <div class="matrix-follower-bar" aria-hidden="true"><span style="--p:${width}%"></span></div>
            </div>
          `;
        }));
        const audienceRow = renderGridRow('定位 → 覆盖', brandItems.map(item => renderAudienceFlow(item.target, item.coverage)));
        const contentRow = renderGridRow('内容方向', brandItems.map(item => renderCompactList(item.accountContent, 4, 120)));
        const hotRow = renderGridRow('Top 热帖', brandItems.map(item => renderFullList(item.hotContent)), 'is-hot-row');
        const typeRow = renderGridRow('热帖内容类型', brandItems.map(item => renderTypeText(item.tags)), 'is-type-row');

        return `
          <section class="matrix-platform-panel" data-platform="${platform.key}"${platformIndex === 0 ? '' : ' hidden'}>
            <div class="matrix-platform-summary">
              <div class="matrix-summary-card">
                <span class="matrix-summary-label">平台角色</span>
                <div class="matrix-summary-value">${summary.role}</div>
              </div>
              <div class="matrix-summary-card">
                <span class="matrix-summary-label">最强账号规模</span>
                <div class="matrix-summary-value">${summarizeTopBrand(platform)}</div>
              </div>
              <div class="matrix-summary-card">
                <span class="matrix-summary-label">运营启示</span>
                <div class="matrix-summary-value">${summary.action}</div>
              </div>
            </div>
            <div class="matrix-compare-grid">
              ${brandRow}
              ${pageRow}
              ${followerRow}
              ${audienceRow}
              ${contentRow}
              ${hotRow}
              ${typeRow}
            </div>
          </section>
        `;
      }).join('');

      const viewWrapper = document.createElement('div');
      viewWrapper.className = 'matrix-view-wrapper show-cards';
      viewWrapper.innerHTML = `
        <div class="matrix-view-header" style="justify-content: flex-end;">
          <div class="view-switch-control">
            <button class="switch-btn active" data-view="cards">交互视图</button>
            <button class="switch-btn" data-view="table">完整表格视图</button>
            <span class="switch-slider"></span>
          </div>
        </div>
        <div class="matrix-cards-view">
          <div class="matrix-platform-tabs">${platformTabsHTML}</div>
          ${panelsHTML}
        </div>
      `;

      const tableView = document.createElement('div');
      tableView.className = 'matrix-table-view';
      targetWrap.closest('.collapsible-question')?.classList.add('has-matrix-view');
      targetWrap.parentNode.insertBefore(viewWrapper, targetWrap);
      tableView.appendChild(targetWrap);
      targetTable.querySelectorAll('td, th').forEach(cell => {
        const text = cell.textContent.trim();
        if (['快手', '抖音', '小红书', '微信', '视频号', 'YouTube'].includes(text)) {
          const svg = getPlatformSvg(text);
          if (svg) {
            cell.innerHTML = `<span class="platform-cell-wrapper">${svg}${escapeHTML(text)}</span>`;
          }
        }
      });
      viewWrapper.appendChild(tableView);

      const switchBtns = [...viewWrapper.querySelectorAll('.view-switch-control .switch-btn')];
      viewWrapper.querySelector('.view-switch-control').addEventListener('click', event => {
        const btn = event.target.closest('.switch-btn');
        if (!btn || btn.classList.contains('active')) return;
        switchBtns.forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
        viewWrapper.classList.toggle('show-table', btn.dataset.view === 'table');
        viewWrapper.classList.toggle('show-cards', btn.dataset.view !== 'table');
      });

      const tabs = [...viewWrapper.querySelectorAll('.matrix-platform-tab')];
      const panels = [...viewWrapper.querySelectorAll('.matrix-platform-panel')];
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(item => item.classList.remove('active'));
          tab.classList.add('active');
          const platform = tab.dataset.platform;
          panels.forEach(panel => {
            panel.hidden = panel.dataset.platform !== platform;
          });
        });
      });
    }

    function enhanceCreatorSearchEvidence() {
      const wraps = [...content.querySelectorAll('.table-wrap')];
      let targetWrap = null;
      let targetTable = null;

      for (const wrap of wraps) {
        const table = wrap.querySelector('table');
        if (!table) continue;
        const headers = [...table.querySelectorAll('th')].map(th => th.textContent.trim());
        const text = table.textContent;
        if (headers.includes('搜索词') && headers.includes('快手') && headers.includes('视频号') && text.includes('Top10搜索结构机构')) {
          targetWrap = wrap;
          targetTable = table;
          break;
        }
      }
      if (!targetWrap || !targetTable || targetWrap.closest('.creator-search-view-wrapper')) return;

      const headers = [...targetTable.querySelectorAll('th')].map(th => th.textContent.trim());
      const rows = [...targetTable.querySelectorAll('tbody tr')];
      const platforms = headers.slice(1).map((name, index) => ({
        name,
        key: `platform-${index}`,
        fields: {}
      }));

      rows.forEach(row => {
        const cells = [...row.querySelectorAll('td')];
        if (cells.length < headers.length) return;
        const label = cells[0].textContent.trim();
        platforms.forEach((platform, index) => {
          platform.fields[label] = cells[index + 1]?.innerHTML.trim() || '';
        });
      });

      function splitMediaCell(html) {
        const box = document.createElement('div');
        box.innerHTML = html || '';
        const figures = [...box.querySelectorAll('figure')].map(figure => figure.outerHTML).join('');
        box.querySelectorAll('figure').forEach(figure => figure.remove());
        return { text: box.innerHTML.trim(), figures };
      }

      function splitBlocks(html) {
        return (html || '')
          .split(/(?:<br\s*\/?>(?:\s|&nbsp;)*){2,}/i)
          .map(part => part.trim())
          .filter(Boolean);
      }

      function renderChips(html) {
        const chips = splitBlocks(html);
        if (!chips.length) return '-';
        return `<div class="creator-search-chip-list">${chips.map(chip => `<span class="creator-search-chip">${chip}</span>`).join('')}</div>`;
      }

      function renderInsightRows(html) {
        const rows = splitBlocks(html);
        if (!rows.length) return html || '-';
        return `<div class="creator-search-insight-list">${rows.map(row => {
          const text = document.createElement('div');
          text.innerHTML = row;
          const plain = text.textContent || '';
          const index = plain.indexOf('：');
          if (index < 0) return `<div class="creator-search-insight-row"><span class="creator-search-insight-value">${row}</span></div>`;
          const key = escapeHTML(plain.slice(0, index + 1));
          const value = row.replace(/^.*?：/, '');
          return `<div class="creator-search-insight-row"><span class="creator-search-insight-key">${key}</span><span class="creator-search-insight-value">${value}</span></div>`;
        }).join('')}</div>`;
      }

      function compactText(html) {
        const blocks = splitBlocks(html).map(block => {
          const box = document.createElement('div');
          box.innerHTML = block;
          return (box.textContent || '').replace(/\s+/g, ' ').trim();
        }).filter(Boolean);
        if (blocks.length) return escapeHTML(blocks.join(' / '));
        const box = document.createElement('div');
        box.innerHTML = html || '';
        return escapeHTML((box.textContent || '-').replace(/\s+/g, ' ').trim() || '-');
      }

      function renderFactSection(label, html, variant = '') {
        const blocks = splitBlocks(html).map(block => block.replace(/<br\s*\/?>(?!\s*$)/gi, '；'));
        const content = blocks.length
          ? blocks.map(block => `<div class="creator-search-fact-line">${block}</div>`).join('')
          : '<div class="creator-search-fact-line">-</div>';
        return `<section class="creator-search-fact-section ${variant}"><div class="creator-search-fact-label">${label}</div><div class="creator-search-fact-content">${content}</div></section>`;
      }

      function platformSvg(name) {
        return getPlatformSvg(name);
      }

      const cardsHTML = platforms.map(platform => {
        const page = splitMediaCell(platform.fields['页面']);
        const hot = splitMediaCell(platform.fields['最火']);
        return `
          <article class="creator-search-card creator-search-flat-card" data-platform="${platform.key}">
            <div class="creator-search-card-header">
              <div class="creator-platform-title">
                <span class="creator-platform-icon">${platformSvg(platform.name)}</span>
                <div class="creator-search-platform-name">${escapeHTML(platform.name)}</div>
              </div>
            </div>
            <div class="creator-search-flat-body">
              <div class="creator-search-image-block is-page-shot">
                <span class="creator-search-shot-label">搜索页</span>
                ${page.figures || '<div class="creator-search-field-content">暂无截图</div>'}
              </div>
              ${renderFactSection('机构占位', platform.fields['Top10搜索结构机构'], 'is-org-distribution')}
              <div class="creator-search-image-block is-hot-sample">
                <span class="creator-search-shot-label">最火视频 / 笔记</span>
                <div class="creator-search-hot-text">${compactText(hot.text)}</div>
                ${hot.figures || '<div class="creator-search-field-content">暂无截图</div>'}
              </div>
              <div class="creator-search-facts">
                ${renderFactSection('最火内容解析', platform.fields['韩国汇款'], 'is-hot-analysis')}
                ${renderFactSection('达人生态判断', platform.fields['观察结论'], 'is-eco-feature')}
              </div>
            </div>
          </article>
        `;
      }).join('');

      const viewWrapper = document.createElement('div');
      viewWrapper.className = 'creator-search-view-wrapper show-cards';
      viewWrapper.innerHTML = `
        <div class="creator-search-view-header">
          <div class="creator-search-view-subtitle" style="padding-left: 0;">四个平台并排对比；点赞 / 收藏仅对应各平台展示的高互动视频 or 笔记。</div>
          <div class="view-switch-control">
            <button class="switch-btn active" data-view="cards">平台解读视图</button>
            <button class="switch-btn" data-view="table">完整表格视图</button>
            <span class="switch-slider"></span>
          </div>
        </div>
        <div class="creator-search-cards-view">
          <div class="creator-search-card-grid">${cardsHTML}</div>
        </div>
      `;

      const tableView = document.createElement('div');
      tableView.className = 'creator-search-table-view';
      targetWrap.closest('.collapsible-question')?.classList.add('has-creator-search-view');
      targetWrap.parentNode.insertBefore(viewWrapper, targetWrap);
      tableView.appendChild(targetWrap);
      targetTable.querySelectorAll('td, th').forEach(cell => {
        const text = cell.textContent.trim();
        if (['快手', '抖音', '小红书', '微信', '视频号', 'YouTube'].includes(text)) {
          const svg = getPlatformSvg(text);
          if (svg) {
            cell.innerHTML = `<span class="platform-cell-wrapper">${svg}${escapeHTML(text)}</span>`;
          }
        }
      });
      viewWrapper.appendChild(tableView);

      const switchBtns = [...viewWrapper.querySelectorAll('.view-switch-control .switch-btn')];
      viewWrapper.querySelector('.view-switch-control').addEventListener('click', (event) => {
        const btn = event.target.closest('.switch-btn');
        if (!btn || btn.classList.contains('active')) return;
        switchBtns.forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
        viewWrapper.classList.toggle('show-table', btn.dataset.view === 'table');
        viewWrapper.classList.toggle('show-cards', btn.dataset.view !== 'table');
        if (btn.dataset.view !== 'table') {
          setTimeout(alignHeights, 50);
        }
      });

      function alignHeights() {
        const selectors = [
          '.creator-search-card-header',
          '.is-org-distribution',
          '.is-hot-analysis',
          '.is-eco-feature'
        ];
        
        selectors.forEach(sel => {
          const elements = [...viewWrapper.querySelectorAll(sel)];
          // Reset heights first to measure natural height
          elements.forEach(el => { el.style.height = ''; });
          
          // Only align if columns are displayed side-by-side (desktop layout: min-width 861px)
          if (window.innerWidth <= 860) {
            return;
          }
          
          let maxHeight = 0;
          elements.forEach(el => {
            const h = el.getBoundingClientRect().height;
            if (h > maxHeight) maxHeight = h;
          });
          
          if (maxHeight > 0) {
            elements.forEach(el => {
              el.style.height = `${maxHeight}px`;
            });
          }
        });

          if (!table || wrap.closest('.section5-visual-wrapper')) return false;
          const headers = [...table.querySelectorAll('th')].map(th => th.textContent.trim());
          return headers.includes('优先级') && headers.includes('内容资源占比') && headers.includes('主动作') && (headers.includes('排序依据') || headers.includes('优先原因'));
        });
        if (!targetWrap) return;
        const rows = [...targetWrap.querySelectorAll('tbody tr')];
        const accents = [
          { color: '#1f3a5f' },
          { color: '#3f7f8f' },
          { color: '#b8873b' },
          { color: '#6f8d6a' }
        ];
        const renderReasonPoints = (html) => {
          const points = (html || '')
            .split(/<br\s*\/?>/i)
            .map(item => item.trim())
            .filter(Boolean);
          return `<div class="section5-priority-points">${
            points.map(point => `<div class="section5-priority-point">${point}</div>`).join('')
          }</div>`;
        };
        const items = rows.map((row, index) => {
          const cells = row.cells;
          const style = accents[index] || accents[0];
          const priorityText = textFromHTML(cells[0]?.innerHTML || '');
          const rank = priorityText.match(/^P\d/)?.[0] || `P${index}`;
          const name = priorityText.replace(rank, '').trim();
          const share = textFromHTML(cells[1]?.innerHTML || '');
          const pct = Math.max(0, Math.min(100, parseFloat(share.replace(/[^\d.]/g, '')) || 0));
          return { cells, style, rank, name, share, pct };
        });
        const allocationBar = items.map(item => `
          <div class="section5-priority-segment" style="--priority-color:${item.style.color};--priority-width:${item.pct}%">
            <span>${escapeHTML(item.rank)}</span>
            <b>${escapeHTML(item.share)}</b>
          </div>
        `).join('');
        const rowsHTML = items.map(item => {
          const { cells, style, rank, name, share, pct } = item;
          return `
            <article class="section5-priority-row" style="--priority-color:${style.color};--priority-width:${pct}%">
              <div class="section5-priority-rank">
                <span class="section5-priority-dot"></span>
                <span class="section5-priority-pill">${escapeHTML(rank)}</span>
                <span class="section5-priority-name">${escapeHTML(name)}</span>
              </div>
              <div class="section5-priority-share">
                <div class="section5-priority-percent">${escapeHTML(share)}</div>
                <div class="section5-priority-meter"><span></span></div>
              </div>
              <div class="section5-priority-block">
                <span class="section5-priority-label">主动作</span>
                <div class="section5-priority-text">${cells[2]?.innerHTML || ''}</div>
              </div>
              <div class="section5-priority-block">
                <span class="section5-priority-label">排序依据</span>
                ${renderReasonPoints(cells[3]?.innerHTML || '')}
                <div class="section5-priority-module">
                  <span class="section5-priority-label">对应模块</span>
                  <div class="section5-priority-text">${cells[4]?.innerHTML || ''}</div>
                </div>
              </div>
            </article>
          `;
        }).join('');

        const wrapper = document.createElement('div');
        wrapper.className = 'section5-visual-wrapper section5-priority-wrapper';
        wrapper.innerHTML = `
          <div class="section5-visual-header">
            <div>
              <h4 class="section5-visual-title">优先级收尾：P0 打透主入口，P3 再做外围补强</h4>
              <p class="section5-visual-subtitle">内容资源先投主链路，再投入场景突破、信任背书和复汇运营。</p>
            </div>
          </div>
          <div class="section5-priority-board">
            <div class="section5-priority-bar">${allocationBar}</div>
            <div class="section5-priority-list">${rowsHTML}</div>
          </div>
        `;
        targetWrap.parentNode.insertBefore(wrapper, targetWrap);
        targetWrap.remove();
      }

      enhanceSection23Flow();
      enhanceJourneyMap();
      enhanceKfsTable();
      enhancePlatformTable();
      enhanceContentPackageTable();
      enhancePriorityTable();
    }

    function initLightbox() {
      const modal = document.createElement('div');
      modal.className = 'lightbox-modal';
      modal.innerHTML = `
        <span class="lightbox-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </span>
        <img class="lightbox-content" src="" alt="preview">
        <div class="lightbox-caption"></div>
      `;
      document.body.appendChild(modal);

      const modalImg = modal.querySelector('.lightbox-content');
      const caption = modal.querySelector('.lightbox-caption');
      const closeBtn = modal.querySelector('.lightbox-close');

      document.addEventListener('click', (e) => {
        const img = e.target.closest('#content img, .phone-screen img, .kfs-table-view img, .kfs-image-card img');
        if (!img) return;
        if (img.naturalWidth === 0) return;

        modalImg.src = img.src;
        let captionText = img.getAttribute('alt') || '';
        if (captionText) {
          caption.textContent = captionText;
          caption.style.display = 'block';
        } else {
          caption.style.display = 'none';
        }

        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
      });

      const closeModal = () => {
        modal.classList.remove('active');
        document.body.style.overflow = '';
        setTimeout(() => {
          modalImg.src = '';
        }, 300);
      };

      closeBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal || e.target === closeBtn) {
          closeModal();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
          closeModal();
        }
      });
    }

    content.innerHTML = renderMarkdown(source);
    wrapChapters();
    enhanceTables();
    enhancePersonas();
    enhanceKfsPyramid();
    enhanceCognitiveBlocks();
    enhancePlatformMatrixEvidence();
    enhanceCreatorSearchEvidence();
    enhanceSection5Playbook();
    [...content.querySelectorAll('.chapter-card')].forEach(clusterImages);
    initLightbox();

    const headings = [...content.querySelectorAll('h2[id], h3[id], h4[id]')];
    toc.innerHTML = headings.map(h => `<a class="${h.tagName.toLowerCase()}" href="#${h.id}">${h.textContent}</a>`).join('');

    const tocLinks = [...toc.querySelectorAll('a')];
    const observer = new IntersectionObserver(entries => {
      const active = entries.filter(entry => entry.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
      if (!active) return;
      tocLinks.forEach(link => link.classList.toggle('active', link.getAttribute('href') === `#${active.target.id}`));
    }, { rootMargin: '-25% 0px -65% 0px', threshold: [0, .2, .6, 1] });
    headings.forEach(h => observer.observe(h));

    function updateProgress() {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      progress.style.width = `${Math.max(0, Math.min(100, (window.scrollY / max) * 100))}%`;
    }
    window.addEventListener('scroll', updateProgress, { passive: true });
    updateProgress();
  </script>
</body>
</html>
